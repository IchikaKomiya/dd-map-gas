name: Deploy web to GitHub Pages

# web/ をビルドして GitHub Pages へ公開する。
# 事前準備:
#   - リポジトリ Settings → Pages → Source を "GitHub Actions" に設定
#   - Settings → Secrets and variables → Actions → Variables に
#     VITE_API_BASE = GAS Web App の /exec URL を登録
on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm のバージョンは package.json の "packageManager" から解決する
      # （ここで version を指定すると二重指定エラーになる）
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # ルートに pnpm workspace の単一ロックファイルがあるため、ルートで install する
      - run: pnpm install --frozen-lockfile

      - name: Build web
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
        run: pnpm --filter dd-map-web build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
